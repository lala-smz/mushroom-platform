[build]
builder = "nixpacks"

[deploy]
startCommand = "npm run deploy:prod"

[env]
NODE_ENV = "production"
PORT = "3303"

[services]
mysql = "mysql"
redis = "redis"

[variables]
MYSQL_HOST = "${{ MYSQLHOST }}"
MYSQL_PORT = "${{ MYSQLPORT }}"
MYSQL_USER = "${{ MYSQLUSER }}"
MYSQL_PASSWORD = "${{ MYSQLPASSWORD }}"
MYSQL_DATABASE = "${{ MYSQLDATABASE }}"
REDIS_URL = "${{ REDIS_URL }}"
JWT_SECRET = "58da95d558bab65ec44b1ef6dbd479843d6f9353bd8b67d8119c74921199e383"
API_URL = "https://your-app-name.up.railway.app"